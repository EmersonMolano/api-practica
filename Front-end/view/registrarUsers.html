<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>

    <div class="container">
        <h1>Registro de Usuarios</h1>
        
        <a href="index.html" class="btn btn-secondary">Volver al Panel</a>

        <form id="userForm">
            <div class="form-group" style="display:none;">
                <label for="userId">ID</label>
                <input type="text" id="userId" class="form-control" disabled>
            </div>
            <div class="form-group">
                <label for="userName">Nombre</label>
                <input type="text" id="userName" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="userLastName">Apellido</label>
                <input type="text" id="userLastName" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="userEmail">Correo</label>
                <input type="email" id="userEmail" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="userPhone">Teléfono</label>
                <input type="tel" id="userPhone" class="form-control" pattern="[0-9]+" required placeholder="Solo números">
            </div>
            <div class="form-group">
                <label for="userAge">Edad</label>
                <input type="number" id="userAge" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Registrar Usuario</button>
        </form>

        <h2>Lista de Usuarios</h2>
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Edad</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="usersContainer">

            </tbody>
        </table>
    </div>

    <!-- Modal de Edición -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Editar Usuario</h2>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label for="editUserName">Nombre</label>
                    <input type="text" id="editUserName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="editUserLastName">Apellido</label>
                    <input type="text" id="editUserLastName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="editUserEmail">Correo</label>
                    <input type="email" id="editUserEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="editUserPhone">Teléfono</label>
                    <input type="tel" id="editUserPhone" class="form-control" pattern="[0-9]+" required placeholder="Solo números">
                </div>
                <div class="form-group">
                    <label for="editUserAge">Edad</label>
                    <input type="number" id="editUserAge" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="editUserProduct">Producto</label>
                    <input type="text" id="editUserProduct" class="form-control">
                </div>
                <div class="form-group">
                    <label for="editUserQuantity">Cantidad</label>
                    <input type="number" id="editUserQuantity" class="form-control">
                </div>
                <div class="form-group">
                    <label for="editUserTotal">Total</label>
                    <input type="number" step="0.01" id="editUserTotal" class="form-control" readonly>
                </div>
                <button type="submit" class="btn btn-warning">Actualizar Usuario</button>
            </form>
        </div>
    </div>

    <script src="../js/const.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/users.js"></script>
</body>

</html>
