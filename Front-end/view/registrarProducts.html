<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>

    <div class="container">
        <h1>Registro de Productos</h1>
        
        <a href="index.html" class="btn btn-secondary">Volver al Panel</a>

        <form id="productForm">
            <div class="form-group" style="display:none;">
                <label for="productId">ID</label>
                <input type="text" id="productId" class="form-control" disabled>
            </div>
            <div class="form-group">
                <label for="productName">Nombre del Producto</label>
                <input type="text" id="productName" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="productPrice">Precio</label>
                <input type="number" step="0.01" id="productPrice" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="productStock">Stock</label>
                <input type="number" id="productStock" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success">Registrar Producto</button>
        </form>

        <h2>Lista de Productos</h2>
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="productsContainer">

            </tbody>
        </table>
    </div>

    <!-- Modal de Edición -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Editar Producto</h2>
            <form id="editProductForm">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label for="editProductName">Nombre del Producto</label>
                    <input type="text" id="editProductName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="editProductPrice">Precio</label>
                    <input type="number" step="0.01" id="editProductPrice" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="editProductStock">Stock</label>
                    <input type="number" id="editProductStock" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-warning">Actualizar Producto</button>
            </form>
        </div>
    </div>

    <script src="../js/const.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/products.js"></script>
</body>

</html>
